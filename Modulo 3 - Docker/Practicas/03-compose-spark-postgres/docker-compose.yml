services:
  spark:
    image: apache/spark:3.5.0
    container_name: m3_spark
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./jobs:/opt/jobs

  postgres:
    image: postgres:16
    container_name: m3_postgres_spark
    environment:
      POSTGRES_DB: bigdata
      POSTGRES_USER: bigdata
      POSTGRES_PASSWORD: bigdata
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bigdata -d bigdata"]
      interval: 5s
      timeout: 3s
      retries: 10
